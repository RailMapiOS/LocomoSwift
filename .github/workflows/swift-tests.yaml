name: Swift Package Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-macos:
    name: Test (macOS)
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test

  test-linux-x86_64:
    name: Test (Linux x86_64)
    runs-on: ubuntu-latest
    container: swift:6.2-jammy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test

  test-linux-arm64:
    name: Test (Linux ARM64 via QEMU)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & test on ARM64
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$PWD":/pkg -w /pkg \
            swift:6.2-jammy \
            bash -c "swift build && swift test"
